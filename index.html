  <style>
    :root {
      --gutter: clamp(20px, 5vw, 64px);
      --ink-black: #FFFFFF;
      --navy-deep: #F4EFE6;
      --panel: #F7F3EA99;
      --panel-2: #F1ECE1;
      --cream: #14181C;
      --cream-dim: rgba(20,24,28,0.72);
      --muted: rgba(20,24,28,0.5);
      --gold: #8A6D2E;
      --cobalt: #2C53C9;
      --hair: rgba(20,24,28,0.12);
      --hair-strong: rgba(20,24,28,0.28);
      --ink: var(--cream);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--ink-black);
      color: var(--cream);
      font-family: var(--font-sans, 'Jost', system-ui, sans-serif);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    img { max-width: 100%; }
    ::selection { background: var(--cobalt); color: #fff; }

    .feiri-marquee { animation: feiri-scroll 38s linear infinite; }
    @keyframes feiri-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .feiri-btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
    .feiri-btn:active { transform: translateY(1px); }
    a { transition: color .2s ease; }
    .feiri-nav a:hover { color: var(--cream); }

    @media (max-width: 900px) {
      .feiri-2col { grid-template-columns: 1fr !important; }
    }

    .feiri-owners-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      align-items: start;
    }
    .feiri-owners-grid > :nth-child(even) { margin-top: 40px; }
    .feiri-owner-card img { will-change: transform; }
    .feiri-owner-card:hover { transform: translateY(-4px); box-shadow: 0 26px 60px rgba(0,0,0,0.55) !important; }
    .feiri-owner-card:hover img { transform: scale(1.05); }
    .feiri-owner-card { transition: transform .3s ease, box-shadow .3s ease; }
    @media (max-width: 860px) {
      .feiri-owners-grid { grid-template-columns: repeat(3, 1fr); }
      .feiri-owners-grid > :nth-child(even) { margin-top: 0; }
      .feiri-owners-grid > :nth-child(3n-1) { margin-top: 32px; }
    }
    @media (max-width: 520px) {
      .feiri-owners-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .feiri-owners-grid > :nth-child(n) { margin-top: 0; }
      .feiri-owners-grid > :nth-child(even) { margin-top: 26px; }
      .feiri-br { display: none; }
    }
    @media (max-width: 720px) {
      .feiri-nav { display: none !important; }
      header [style*="grid-template-columns: 1fr auto 1fr"] { grid-template-columns: auto 1fr !important; }
      .feiri-hero-section { min-height: 78vh !important; }
      .feiri-hero-img { object-position: 35% 25% !important; }
    }
    @media (max-width: 520px) {
      .feiri-compare-head, .feiri-compare-head ~ div { font-size: 13px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .feiri-marquee { animation: none; }
      html { scroll-behavior: auto; }
    }

    /* --- The Lookbook --- */
    .lb-masthead { max-width: 640px; margin-bottom: clamp(40px, 5vw, 64px); }
    .lb-meta { display: flex; align-items: center; gap: 18px; margin-top: 28px; }
    .lb-rule { flex: 1; height: 1px; background: var(--hair); }
    .feiri-lookbook { display: flex; flex-direction: column; gap: clamp(30px, 4.5vw, 64px); }
    .lb-chapter { display: flex; align-items: center; gap: 18px; padding: 4px 0; }
    .lb-row-duo { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px, 2.2vw, 28px); }
    .lb-row-trio { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(16px, 2.2vw, 28px); }
    .lb-row-feat { display: grid; grid-template-columns: 1.14fr 0.86fr; gap: clamp(16px, 2.2vw, 28px); align-items: start; }
    .lb-row-feat--rev { grid-template-columns: 0.86fr 1.14fr; }
    .lb-stack { display: flex; flex-direction: column; gap: clamp(16px, 2.2vw, 28px); }
    .lb-fig { margin: 0; display: flex; flex-direction: column; }
    .lb-frame { position: relative; overflow: hidden; border-radius: 10px; border: 1px solid var(--hair); background: #000; box-shadow: 0 24px 60px rgba(0,0,0,0.45); }
    .lb-frame img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; transition: transform .9s cubic-bezier(.2,.7,.2,1); }
    .lb-fig:hover .lb-frame img { transform: scale(1.045); }
    .lb-cap { display: flex; align-items: baseline; gap: 13px; padding: 13px 3px 0; }
    .lb-idx { letter-spacing: 0.02em; }
    .lb-place { letter-spacing: 0.01em; }
    .lb-tag { margin-left: auto; letter-spacing: 0.16em; text-transform: uppercase; white-space: nowrap; }
    .lb-close { margin-top: clamp(40px, 5vw, 64px); padding-top: 24px; border-top: 1px solid var(--hair); text-align: center; }
    @media (max-width: 820px) {
      .lb-row-feat, .lb-row-feat--rev { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .lb-row-duo, .lb-row-trio { grid-template-columns: 1fr; }
    }
  </style>
